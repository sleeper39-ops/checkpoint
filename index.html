<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remote Storage Control</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #121212; color: #e8eaed; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #333; }
        h2 { color: #8ab4f8; margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-on { color: #81c995; font-weight: bold; }
        .status-off { color: #f28b82; font-weight: bold; }
        
        .row { display: flex; flex-direction: column; text-align: left; margin-bottom: 15px; }
        label { margin-bottom: 5px; font-size: 13px; color: #9aa0a6; }
        input { background: #2d2e31; border: 1px solid #5f6368; color: white; padding: 12px; border-radius: 8px; outline: none; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-save { background: #8ab4f8; color: #202124; margin-top: 10px; }
        .btn-on { background: #34a853; color: white; }
        .btn-off { background: #ea4335; color: white; }

        #log-box { background: #000; color: #00ff00; padding: 15px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
        .conn-status { font-size: 12px; margin-bottom: 10px; color: #9aa0a6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>⚙️ ระบบควบคุมอัตโนมัติ</h2>
            <div class="conn-status" id="conn-text">📡 สถานะการเชื่อมต่อ: กำลังตรวจสอบ...</div>
            <div style="margin-bottom: 15px;">สถานะระบบ: <span id="current-status">---</span></div>
            <div class="btn-group">
                <button class="btn btn-on" onclick="updateConfig({status: 'ON'})">เปิด (ON)</button>
                <button class="btn btn-off" onclick="updateConfig({status: 'OFF'})">ปิด (OFF)</button>
            </div>
        </div>

        <div class="card">
            <h2>📁 ตั้งค่าเส้นทาง (Path)</h2>
            <div class="row">
                <label>ต้นทาง (Source):</label>
                <input type="text" id="path-src">
            </div>
            <div class="row">
                <label>ปลายทาง 1 (Dest 1):</label>
                <input type="text" id="path-d1">
            </div>
            <div class="row">
                <label>ปลายทาง 2 (Dest 2):</label>
                <input type="text" id="path-d2">
            </div>
            <div class="row">
                <label>เวลาทำงาน (HH:MM):</label>
                <input type="time" id="work-time">
            </div>
            <button class="btn btn-save" onclick="saveAllSettings()">💾 บันทึกการตั้งค่าลงคอมพิวเตอร์</button>
        </div>

        <div class="card">
            <h2>📜 Log ล่าสุด</h2>
            <div id="log-box">รอการเชื่อมต่อจาก Tailscale...</div>
        </div>
    </div>

    <script>
        const API_BASE = "http://100.86.85.2:8080/api"; 

        async function fetchConfig() {
            try {
                const res = await fetch(`${API_BASE}/get_config`);
                const data = await res.json();
                
                document.getElementById('current-status').innerText = data.status;
                document.getElementById('current-status').className = data.status === 'ON' ? 'status-on' : 'status-off';
                document.getElementById('path-src').value = data.source || '';
                document.getElementById('path-d1').value = data.dest1 || '';
                document.getElementById('path-d2').value = data.dest2 || '';
                document.getElementById('work-time').value = data.time || '';
                
                document.getElementById('conn-text').innerHTML = "🟢 เชื่อมต่อคอมพิวเตอร์สำเร็จ (VPN Active)";
                
                if (data.logs) {
                    document.getElementById('log-box').innerHTML = data.logs.join("<br>");
                    const box = document.getElementById('log-box');
                    box.scrollTop = box.scrollHeight;
                }
            } catch (e) {
                document.getElementById('conn-text').innerHTML = "🔴 ติดต่อคอมไม่ได้ (กรุณาต่อ Tailscale และ Allow Insecure Content)";
            }
        }

        async function updateConfig(payload) {
            try {
                await fetch(`${API_BASE}/set_config`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                fetchConfig();
            } catch (e) {
                alert("ส่งคำสั่งไม่สำเร็จ! เช็ค VPN หรือการตั้งค่าเบราว์เซอร์");
            }
        }

        function saveAllSettings() {
            const payload = {
                source: document.getElementById('path-src').value,
                dest1: document.getElementById('path-d1').value,
                dest2: document.getElementById('path-d2').value,
                time: document.getElementById('work-time').value
            };
            updateConfig(payload);
            alert("อัปเดตข้อมูลเรียบร้อย!");
        }

        setInterval(fetchConfig, 5000); // อัปเดตทุก 5 วินาที
        fetchConfig();
    </script>
</body>
</html>
