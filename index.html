<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Udon Checkpoint - v38 Adjustable UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #1a73e8; --red: #d93025; --dark: #111; --accent: #fbbc04; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 10; }
        .header { position: fixed; top: 12px; left: 12px; z-index: 1000; background: white; padding: 6px 14px; border-radius: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.25); display: flex; align-items: center; gap: 6px; }
        .header h1 { margin: 0; font-size: 13px; color: #333; font-weight: 600; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 5000; display: none; font-size: 34px; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .pin-container { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .white-circle { background: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.4); border: 1.5px solid white; position: relative; font-size: 20px; pointer-events: auto; }
        .white-circle::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid white; }
        .label-tag { background: rgba(0,0,0,0.85); color: white; padding: 3px 12px; border-radius: 12px; font-size: 10px; margin-top: 4px; white-space: nowrap; pointer-events: auto; text-align: center; line-height: 1.3; border: 1px solid rgba(255,255,255,0.15); }
        #chatDrawer { position: fixed; bottom: -65vh; left: 0; width: 100%; height: 60vh; background: white; z-index: 2000; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); transition: 0.4s; display: flex; flex-direction: column; }
        #chatDrawer.active { bottom: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; }
        
        /* แก้ไขบรรทัดนี้เพื่อปรับขนาดรูป (v38) */
        .chat-img { width: 100%; max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; width: 92%; max-width: 450px; transition: 0.3s; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 16px; font-weight: 800; font-size: 15px; background: white; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Kanit'; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9200; display: none; align-items: center; justify-content: center; }
        .modal { background: white; padding: 25px; border-radius: 24px; width: 260px; text-align: center; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="crosshair">📌</div>
    <div id="toast" style="position:fixed; top:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding: 8px 16px; border-radius:8px; z-index:8000; display:none; font-size:13px; text-align:center;"></div>

    <div id="loginOverlay" class="overlay">
        <div class="modal">
            <h3 style="margin-top:0">🔒 ยืนยันสิทธิ์แอดมิน</h3>
            <input type="text" id="adminU" placeholder="ID" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; font-family:'Kanit'">
            <input type="password" id="adminP" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px; font-family:'Kanit'">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold">ยืนยัน</button>
            <button onclick="document.getElementById('loginOverlay').style.display='none'" style="margin-top:10px; background:none; border:none; color:#999">ปิด</button>
        </div>
    </div>

    <div id="nickOverlay" class="overlay">
        <div class="modal">
            <h3>เข้าสู่ระบบแชท</h3>
            <input type="text" id="nickInput" placeholder="พี่บอส อุดร" style="width:100%; padding:14px; margin-bottom:15px; border:1px solid #ddd; border-radius:12px; font-family:'Kanit'">
            <button onclick="saveNick()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold">เริ่ม</button>
        </div>
    </div>

    <div class="header">
        <img src="https://www.gstatic.com/images/branding/product/1x/maps_64dp.png" width="16">
        <h1>Udon Checkpoint (Boss v38)</h1>
        <button id="clearChatBtn" style="display:none; background:red; color:white; padding:4px 10px; border:none; border-radius:20px; font-size:10px; margin-left:8px" onclick="clearAllChat()">ล้างแชท</button>
    </div>

    <button id="adminBtn" style="position:fixed; top:12px; right:12px; z-index:1000; background:white; border:none; padding:8px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.2);" onclick="handleAdminClick()">
        <i data-lucide="shield-check" id="adminIcon" style="color:var(--primary); display:none"></i>
        <i data-lucide="user" id="userIcon"></i>
    </button>

    <div id="map"></div>

    <div id="chatDrawer">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center" onclick="toggleChat()">
            <strong id="chatHeadline" style="font-size:14px">💬 แชทสด</strong>
            <i data-lucide="chevron-down" style="width:18px"></i>
        </div>
        <div id="onlineList" style="background:#fff; border-bottom:1px solid #eee; padding:8px 12px; font-size:10px; display:flex; gap:6px; overflow-x:auto;"></div>
        <div class="chat-messages" id="chatList"></div>
        <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px; margin-bottom:20px; align-items:center">
            <input type="file" id="imgInput" style="display:none" accept="image/*" onchange="uploadToImgBB(this)">
            <button onclick="document.getElementById('imgInput').click()" style="background:#f1f3f4; border:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center"><i data-lucide="camera" style="width:18px"></i></button>
            <input type="text" id="msgInput" style="flex:1; padding:12px 18px; border:1px solid #ddd; border-radius:30px; outline:none; font-family:'Kanit'; font-size:14px" placeholder="คุยกันที่นี่...">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center"><i data-lucide="send" style="width:18px"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn" style="background:#333; color:white" onclick="toggleChat()"><i data-lucide="message-square" style="width:18px"></i> แชท</button>
        <button class="btn" id="startBtn" style="background:var(--primary); color:white" onclick="startSel()">📌 แจ้งด่าน</button>
        <button class="btn" id="confirmPosBtn" style="background:var(--accent); color:black; display:none" onclick="confPos()">📌 ยืนยันพิกัด</button>
        <button class="btn" onclick="location.reload()" style="flex:0.4"><i data-lucide="rotate-cw" style="width:18px"></i></button>
    </div>

    <div id="selector" style="position:fixed; bottom:0; left:0; width:100%; padding:25px 20px 55px; background:white; border-radius:30px 30px 0 0; z-index:6000; display:none; box-shadow:0 -10px 40px rgba(0,0,0,0.4); text-align:center;">
        <h3 style="margin:0; font-size:18px">📌 ประเภทด่านที่พบ</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:25px">
            <button class="choice-btn" style="background:#1a73e8; border:none; padding:20px; border-radius:20px; color:white; font-size:18px; font-weight:bold" onclick="onSubmit('👮 ด่านจราจร')">👮 จราจร</button>
            <button class="choice-btn" style="background:#d93025; border:none; padding:20px; border-radius:20px; color:white; font-size:18px; font-weight:bold" onclick="onSubmit('🚨 ด่านเป่า')">🚨 ด่านเป่า</button>
        </div>
        <button onclick="cancelAndHide()" style="margin-top:25px; border:none; background:none; color:#bbb; font-family:'Kanit'; font-size:14px">ยกเลิก</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 🤫 Obfuscated Data Section ---
        const _0x1 = { f1: atob("QUl6YVN5RDk4T213VXlzZ1FkVW1GZTBWOEVhdm9PNGZDVmx6VVFz"), f2: atob("dWRjcC1kYWRlOC5maXJlYmFzZWFwcC5jb20="), f3: atob("dWRjcC1kYWRlOA=="), f4: atob("aHR0cHM6Ly91ZGNwLWRhZGU4LWRlZmF1bHQtcnRkYi5hc2lhLXNvdXRoZWFzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHA="), i1: atob("OWRkODJjM2UwOTk4M2M2M2VjN2NiYWRiMmQ3Y2YxYmQ="), a1: atob("YWRtaW4="), a2: atob("YWRtaW4yMg==") };
        firebase.initializeApp({ apiKey: _0x1.f1, authDomain: _0x1.f2, projectId: _0x1.f3, databaseURL: _0x1.f4 });
        const db = firebase.database();
        const P_REF = db.ref('points'); const C_REF = db.ref('chat'); const PRES_REF = db.ref('presence');
        let map, markerGroup, nick = localStorage.getItem('chat_nick'), tempMarker = null, isAdmin = sessionStorage.getItem('isAdmin') === 'true';

        window.onload = () => {
            map = L.map('map', { zoomControl:false, attributionControl:false }).setView([17.4138, 102.7872], 14);
            L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&scale=2', { detectRetina: true }).addTo(map);
            markerGroup = L.layerGroup().addTo(map); listenPoints(); listenChat(); listenPresence();
            if(!nick) document.getElementById('nickOverlay').style.display='flex'; else setupPresence();
            if(isAdmin) updateAdminUI(true); lucide.createIcons();
        };

        function handleAdminClick() { if(isAdmin) { if(confirm("ออกจากแอดมิน?")) doLogout(); } else document.getElementById('loginOverlay').style.display='flex'; }
        function doLogin() { if(document.getElementById('adminU').value === _0x1.a1 && document.getElementById('adminP').value === _0x1.a2) { isAdmin=true; sessionStorage.setItem('isAdmin','true'); document.getElementById('loginOverlay').style.display='none'; updateAdminUI(true); } else alert("Error"); }
        function doLogout() { isAdmin=false; sessionStorage.setItem('isAdmin','false'); updateAdminUI(false); }
        function updateAdminUI(show) { document.getElementById('adminIcon').style.display = show ? 'block' : 'none'; document.getElementById('userIcon').style.display = show ? 'none' : 'block'; document.getElementById('clearChatBtn').style.display = show ? 'inline-block' : 'none'; listenChat(); listenPoints(); }

        function listenPoints() {
            P_REF.on('value', snap => {
                markerGroup.clearLayers();
                snap.forEach(c => {
                    const p = c.val(); if(Date.now() - p.createdAt > 10800000) { c.ref.remove(); return; }
                    const d = new Date(p.createdAt); const time = `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
                    const emo = p.type.includes('จราจร') ? '👮' : '🚨';
                    const html = `<div class="pin-container"><div class="white-circle">${emo}</div><div class="label-tag"><div style="font-weight:600; font-size:10px">${p.type}</div><div style="font-size:9px; opacity:0.9">(${p.reporter}) แจ้งเมื่อ ${time}</div></div></div>`;
                    const m = L.marker([p.lat, p.lng], { icon: L.divIcon({ className:'dm', html, iconSize:[0,0], iconAnchor:[17,45] }) }).addTo(markerGroup);
                    m.bindPopup(`<div style="text-align:center"><b>${p.type}</b><br><small>${time}</small><hr><button onclick="voteDown('${c.key}')" style="width:100%; padding:8px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer">${isAdmin?'❌ ลบทันที':`❌ ไม่อยู่แล้ว (${p.votes||0}/3)`}</button></div>`);
                });
            });
        }
        function voteDown(k) { if(isAdmin) { P_REF.child(k).remove(); return; } let voted = JSON.parse(localStorage.getItem('udon_voted') || '[]'); if(voted.includes(k)) { showToast("⚠️ คุณโหวตด่านนี้ไปแล้วครับ"); return; } P_REF.child(k).transaction(c => { if(c) { c.votes = (c.votes||0)+1; if(c.votes >= 3) return null; } return c; }, (e, com) => { if(com) { voted.push(k); localStorage.setItem('udon_voted', JSON.stringify(voted)); showToast("✅ ขอบคุณสำหรับการตรวจสอบครับ"); } }); }
        function uploadToImgBB(input) { const file = input.files[0]; if(!file || !nick) return; const formData = new FormData(); formData.append('image', file); fetch(`https://api.imgbb.com/1/upload?key=${_0x1.i1}`, { method:'POST', body:formData }).then(res=>res.json()).then(data=>{ if(data.success) C_REF.push({ n: nick, t:"", img: data.data.url, ts: firebase.database.ServerValue.TIMESTAMP }); }); input.value = ""; }
        function listenChat() {
            C_REF.limitToLast(50).on('value', snap => {
                const l = document.getElementById('chatList'); l.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(); const isMe = m.n === nick; const id = c.key; const d = new Date(m.ts); const time = `${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
                    const div = document.createElement('div'); div.className = `msg ${isMe?'msg-me':'msg-other'}`;
                    let content = `<small style="display:block; font-weight:bold; opacity:0.7">${m.n} · ${time}</small>`;
                    if(m.t) content += `<div>${m.t}</div>`; 
                    if(m.img) content += `<img src="${m.img}" class="chat-img">`;
                    if(isAdmin) content += `<button style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; width:20px; height:20px; border-radius:50%; font-size:10px" onclick="db.ref('chat/${c.key}').remove()">🗑️</button>`;
                    div.innerHTML = content; l.appendChild(div);
                });
                l.scrollTop = l.scrollHeight;
            });
        }
        function startSel() { document.getElementById('crosshair').style.display='block'; document.getElementById('startBtn').style.display='none'; document.getElementById('confirmPosBtn').style.display='flex'; }
        function confPos() { const c = map.getCenter(); window.activeLL = c; if(tempMarker) map.removeLayer(tempMarker); tempMarker = L.marker(c).addTo(map); document.getElementById('confirmPosBtn').style.display='none'; document.getElementById('selector').style.display='block'; }
        function cancelAndHide() { if(tempMarker) map.removeLayer(tempMarker); document.getElementById('confirmPosBtn').style.display='flex'; document.getElementById('selector').style.display='none'; }
        function cancelAll() { if(tempMarker) map.removeLayer(tempMarker); document.getElementById('crosshair').style.display='none'; document.getElementById('startBtn').style.display='flex'; document.getElementById('confirmPosBtn').style.display='none'; document.getElementById('selector').style.display='none'; }
        function onSubmit(type) { P_REF.push({ lat: window.activeLL.lat, lng: window.activeLL.lng, type, createdAt: firebase.database.ServerValue.TIMESTAMP, votes: 0, reporter: nick }); C_REF.push({ n: '📢 ระบบ', t: `แจ้งพบ ${type} (โดย ${nick})`, ts: firebase.database.ServerValue.TIMESTAMP }); cancelAll(); }
        function setupPresence() { const p = PRES_REF.push(); db.ref(".info/connected").on("value", s=>{ if(s.val()) { p.onDisconnect().remove(); p.set({ name: nick }); } }); }
        function listenPresence() { PRES_REF.on('value', snap => { const list = document.getElementById('onlineList'); let count = 0; list.innerHTML = ""; snap.forEach(c => { count++; const tag = document.createElement('div'); tag.style="background:#f1f3f4; padding:3px 10px; border-radius:12px; font-weight:600; border:1px solid #ddd;"; tag.innerText = (c.val().name===nick?'คุณ: ':'')+c.val().name; list.appendChild(tag); }); document.getElementById('chatHeadline').innerText = `💬 แชทสด (ออนไลน์ ${count})`; }); }
        function saveNick() { const v = document.getElementById('nickInput').value.trim(); if(v) { nick = v; localStorage.setItem('chat_nick', v); document.getElementById('nickOverlay').style.display='none'; setupPresence(); } }
        function toggleChat() { document.getElementById('chatDrawer').classList.toggle('active'); document.querySelector('.bottom-nav').classList.toggle('hide'); }
        function clearAllChat() { if(confirm("ลบแชททั้งหมด?")) C_REF.remove(); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 4000); }
    </script>
</body>
</html>
