<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Udon Checkpoint - Fix v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #1a73e8; --dark: #202124; --accent: #fbbc04; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 10; }
        
        /* Marker Styles */
        .custom-marker {
            display: flex; align-items: center; justify-content: center;
            background: white; border: 2.5px solid #fff; border-radius: 50%;
            width: 46px !important; height: 46px !important; font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: bounce 0.6s infinite alternate ease-in-out;
            pointer-events: auto !important; z-index: 1000 !important;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-7px); } }

        /* Crosshair in center */
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -100%);
            z-index: 500; pointer-events: none; color: #ff1e1e; font-size: 40px; display: none;
        }

        /* UI Overlays */
        .header {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 20px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #ddd;
            display: flex; align-items: center; gap: 10px; min-width: 250px;
        }
        .header h1 { margin: 0; font-size: 15px; color: #333; }

        /* Selection Panel */
        #selector {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 20px 40px;
            background: white; border-radius: 30px 30px 0 0; z-index: 2000;
            display: none; box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            text-align: center; transform: translateY(100%); transition: 0.3s ease;
        }
        #selector.active { transform: translateY(0); display: block; }
        .choice-row { display: flex; gap: 15px; margin-top: 20px; }
        .choice-btn {
            flex: 1; padding: 20px; border: none; border-radius: 20px; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Kanit';
        }

        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 15px; width: 90%; max-width: 400px;
        }
        .btn {
            flex: 1; padding: 16px; border: none; border-radius: 18px;
            font-weight: 600; font-size: 17px; background: white; color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main.active { background: var(--accent); color: black; }

        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 10px 20px; border-radius: 10px; z-index: 3000; display: none; }
    </style>
</head>
<body>

    <div id="crosshair">📍</div>
    <div id="toast"></div>

    <div class="header">
        <img src="https://www.gstatic.com/images/branding/product/1x/maps_64dp.png" width="20">
        <h1 id="statusText">รายงานด่านอุดร (v6)</h1>
    </div>

    <div id="map"></div>

    <div id="selector">
        <h2 style="margin:0; font-size: 18px">📌 ขั้นตอนสุดท้าย: จุดนี้พบด่านอะไร?</h2>
        <div class="choice-row">
            <button class="choice-btn" style="background: #1a73e8" onclick="confirmPoint('👮 ด่านจราจร')">👮 จราจร</button>
            <button class="choice-btn" style="background: #d93025" onclick="confirmPoint('🚨 ด่านเป่า')">🚨 ด่านเป่า</button>
        </div>
        <button onclick="cancelSelection()" style="margin-top:20px; border:none; background:none; color:#777; font-family:'Kanit'">ยกเลิก</button>
    </div>

    <div class="bottom-nav">
        <button class="btn" onclick="location.reload()"><i data-lucide="refresh-cw"></i> รีเฟรช</button>
        <button class="btn btn-main" id="reportBtn" onclick="startSelection()">📌 แจ้งพบด่าน</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const STORAGE_ID = 'udon_v6_final';
        const EXPIRED = 3 * 60 * 60 * 1000;
        let map, markerGroup, currentMode = 'view';

        // --- Init ---
        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([17.4138, 102.7872], 14);
            L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);
            
            markerGroup = L.layerGroup().addTo(map);
            loadAndRender();
            
            // พยายามหาตำแหน่งเรา
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    L.circleMarker([latitude, longitude], { radius: 8, fillColor: "#1a73e8", color: "#fff", weight: 3, opacity: 1, fillOpacity: 0.8 }).addTo(map);
                    map.panTo([latitude, longitude]);
                }, null, { enableHighAccuracy: true });
            }

            // จัดการคลิกแผนที่
            map.on('click', onMapClick);
            
            lucide.createIcons();
        }

        function loadAndRender() {
            markerGroup.clearLayers();
            const now = Date.now();
            let data = JSON.parse(localStorage.getItem(STORAGE_ID) || "[]");
            data = data.filter(p => (now - p.id) < EXPIRED);
            localStorage.setItem(STORAGE_ID, JSON.stringify(data));

            data.forEach(p => {
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: p.type.includes('จราจร') ? '👮' : '🚨',
                    iconSize: [46, 46], iconAnchor: [23, 23]
                });
                const m = L.marker([p.lat, p.lng], { icon }).addTo(markerGroup);
                m.bindPopup(`<b>${p.type}</b><br>แจ้งเมื่อ ${Math.floor((now-p.id)/60000)} นาทีที่แล้ว<br><button onclick="deleteMe(${p.id})" style="margin-top:10px; width:100%">ไม่อยู่แล้ว</button>`);
            });
        }

        function deleteMe(id) {
            let data = JSON.parse(localStorage.getItem(STORAGE_ID) || "[]");
            data = data.filter(p => p.id !== id);
            localStorage.setItem(STORAGE_ID, JSON.stringify(data));
            loadAndRender();
        }

        // --- Workflow ---
        function startSelection() {
            currentMode = 'select';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('reportBtn').classList.add('active');
            document.getElementById('reportBtn').innerHTML = '✅ ยืนยันพิกัดนี้';
            document.getElementById('reportBtn').onclick = finalizePosition;
            showToast("📍 เลื่อนแผนที่ให้หมุดสีแดงตรงกับจุดที่พบด่าน");
        }

        function finalizePosition() {
            const center = map.getCenter();
            openColorSelector(center);
        }

        function onMapClick(e) {
            if (currentMode === 'select') {
                openColorSelector(e.latlng);
            }
        }

        function openColorSelector(latlng) {
            window.activeLatLng = latlng;
            const selector = document.getElementById('selector');
            selector.style.display = 'block';
            setTimeout(() => selector.classList.add('active'), 10);
        }

        function confirmPoint(type) {
            const latlng = window.activeLatLng;
            const data = JSON.parse(localStorage.getItem(STORAGE_ID) || "[]");
            data.push({ id: Date.now(), lat: latlng.lat, lng: latlng.lng, type, votes: 0 });
            localStorage.setItem(STORAGE_ID, JSON.stringify(data));
            
            cancelSelection();
            loadAndRender();
            showToast("✨ บันทึกข้อมูลเรียบร้อย!");
        }

        function cancelSelection() {
            currentMode = 'view';
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('selector').classList.remove('active');
            setTimeout(() => document.getElementById('selector').style.display = 'none', 300);
            
            const btn = document.getElementById('reportBtn');
            btn.classList.remove('active');
            btn.innerHTML = '📌 แจ้งพบด่าน';
            btn.onclick = startSelection;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        function vote(id) { 
            // ระบบโหวตตัดออกชั่วคราวเพื่อความง่าย
        }

        window.onload = initApp;
    </script>
</body>
</html>
