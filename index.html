<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเครือข่าย ศสส.บก.ควบคุม 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; color: #374151; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .modal-active { overflow: hidden; }
        .ip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 4px; }

        /* สีพิเศษตามประเภทอุปกรณ์ */
        .device-server { border-left: 5px solid #ef4444 !important; }
        .device-pc { border-left: 5px solid #3b82f6 !important; }
        .device-notebook { border-left: 5px solid #22c55e !important; }
        .device-fax { border-left: 5px solid #eab308 !important; }
        .device-default { border-left: 5px solid #9ca3af !important; }
        
        .badge-server { background-color: #fee2e2; color: #ef4444; }
        .badge-pc { background-color: #dbeafe; color: #3b82f6; }
        .badge-notebook { background-color: #dcfce7; color: #22c55e; }
        .badge-fax { background-color: #fef9c3; color: #a16207; }
        .badge-gray { background-color: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-slate-800 text-white shadow-lg sticky top-0 z-40 border-b-2 border-slate-700">
        <div class="max-w-full mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-slate-600 p-2 rounded-lg">
                    <i class="fa-solid fa-network-wired text-xl"></i>
                </div>
                <div>
                    <span class="font-bold text-lg tracking-wide block uppercase">ศสส.บก.ควบคุม 2</span>
                    <span class="text-[10px] text-slate-400 block -mt-1 font-medium">Network Management Admin</span>
                </div>
            </div>
            <div class="hidden md:flex gap-6 text-xs font-bold uppercase">
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-emerald-500 rounded-full"></div> ใช้แล้ว: <span id="usedCount" class="text-white">0</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-slate-400 rounded-full"></div> ว่าง: <span id="unusedCount" class="text-white">0</span></div>
            </div>
        </div>
    </nav>

    <div class="max-w-full mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 sticky top-24 overflow-y-auto max-h-[80vh]">
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 pl-2 border-l-2 border-slate-300">แยกตามฝ่าย</h3>
                    <div class="flex flex-col gap-1.5" id="deptMenu"></div>

                    <hr class="my-6 border-slate-100">
                    
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 pl-2 border-l-2 border-slate-300">แยกตามประเภท</h3>
                    <div class="flex flex-col gap-1.5" id="typeMenu"></div>

                    <hr class="my-6 border-slate-100">

                    <button onclick="toggleIpView()" id="btnIpMap" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold transition-all bg-slate-100 text-slate-600 hover:bg-slate-200 mb-3 border border-slate-200">
                        <i class="fa-solid fa-map-location-dot mr-2"></i> ดูผัง IP 1-255
                    </button>
                    <button onclick="openModal()" class="w-full bg-slate-700 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                        <i class="fa-solid fa-plus-circle"></i> เพิ่มอุปกรณ์
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                
                <div class="relative group">
                    <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-slate-600"></i>
                    <input type="text" id="searchInput" onkeyup="filterDevices()" placeholder="ค้นหาชื่ออุปกรณ์, หมายเลข IP, ฝ่าย หรือประเภทอุปกรณ์..." class="w-full pl-14 pr-6 py-4 rounded-2xl border border-slate-200 focus:border-slate-400 bg-white shadow-sm outline-none transition-all font-medium">
                </div>

                <div id="tableView" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">ข้อมูลอุปกรณ์</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">ประเภท</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">หมายเลข IP</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">ฝ่ายที่รับผิดชอบ</th>
                                    <th class="px-6 py-4 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="deviceTableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <div id="ipMapView" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in duration-300">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-network-wired text-slate-500"></i> โครงสร้างหมายเลข IP (192.168.10.x)
                    </h2>
                    <div class="ip-grid" id="ipGridContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden transition-all scale-100">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-900" id="modalTitle">ลงทะเบียนอุปกรณ์</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 text-slate-400 transition-colors">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <form id="deviceForm" onsubmit="handleSave(event)" class="p-8 space-y-5 text-sm">
                <input type="hidden" id="deviceId">
                <div>
                    <label class="block font-bold text-slate-600 mb-2">ชื่ออุปกรณ์</label>
                    <input type="text" id="deviceName" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-slate-50" placeholder="ระบุชื่อเรียกอุปกรณ์">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold text-slate-600 mb-2">ประเภทอุปกรณ์</label>
                        <select id="deviceType" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-white">
                            <option value="PC">คอมพิวเตอร์ (PC)</option>
                            <option value="Notebook">โน้ตบุ๊ก (Notebook)</option>
                            <option value="Printer">ปริ้นเตอร์ (Printer)</option>
                            <option value="Mobile">มือถือ (Mobile)</option>
                            <option value="iPad">ไอแพด (iPad)</option>
                            <option value="Server">เซิร์ฟเวอร์ (Server)</option>
                            <option value="Router">เราเตอร์ (Router/Wi-Fi)</option>
                            <option value="Switch">สวิตช์ฮับ (Switch)</option>
                            <option value="Fax">แฟกซ์ (Fax)</option>
                            <option value="Other">อุปกรณ์อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold text-slate-600 mb-2">IP Address</label>
                        <input type="text" id="deviceIp" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-500 outline-none mono font-bold text-blue-600" placeholder="192.168.10.x">
                    </div>
                </div>
                <div>
                    <label class="block font-bold text-slate-600 mb-2">ฝ่ายที่รับผิดชอบ</label>
                    <select id="deviceDept" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-white font-bold">
                        <option value="ส่วนกลาง">ส่วนกลาง / ระบบหลัก</option>
                        <option value="ศสส.">ศสส.</option>
                        <option value="ฝขว.">ฝขว.</option>
                        <option value="ฝยก.">ฝยก.</option>
                        <option value="หน่วย 250">หน่วย 250.</option>
                        <option value="ปจว.">ปจว.</option>
                        <option value="ฝปส.">ฝปส.</option>
                        <option value="ฝยส.">ฝยส.</option>
                        <option value="ศสน.">ศสน.</option>
                    </select>
                </div>

                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-3.5 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button type="submit" class="flex-1 px-6 py-3.5 rounded-xl font-bold bg-slate-700 text-white hover:bg-slate-900 shadow-lg transition-all transform active:scale-95">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. ข้อมูลเริ่มต้นดึงจากไฟล์หลัก ---
        let devices = [
            { id: 1, name: 'Firewall/Server หลัก', type: 'Server', ip: '192.168.10.1', dept: 'ส่วนกลาง' },
            { id: 2, name: 'Server ศสส.', type: 'Server', ip: '192.168.10.50', dept: 'ศสส.' },
            { id: 3, name: 'PC ศสส. 01', type: 'PC', ip: '192.168.10.51', dept: 'ศสส.' },
            { id: 4, name: 'Fax ศสส.', type: 'Fax', ip: '-', dept: 'ศสส.' },
            { id: 5, name: 'PC ฝขว. (จุด 76)', type: 'PC', ip: '192.168.10.76', dept: 'ฝขว.' },
            { id: 6, name: 'Server ฝยก.', type: 'Server', ip: '192.168.10.100', dept: 'ฝยก.' },
            { id: 7, name: 'Notebook เจ้าหน้าที่ 01', type: 'Notebook', ip: '192.168.10.64', dept: 'ฝขว.' },
            { id: 8, name: 'Printer Network ฝขว.', type: 'Printer', ip: '192.168.10.70', dept: 'ฝขว.' },
            { id: 9, name: 'iPad งานประชาสัมพันธ์', type: 'iPad', ip: '192.168.10.128', dept: 'ฝปส.' },
            { id: 10, name: 'Mobile กองร้อย 01', type: 'Mobile', ip: '192.168.10.125', dept: 'ปจว.' },
            { id: 11, name: 'Notebook ส่วนตัว ฝยส.', type: 'Notebook', ip: '192.168.10.133', dept: 'ฝยส.' },
            { id: 12, name: 'Router Gateway 02', type: 'Router', ip: '192.168.20.1', dept: 'ส่วนกลาง' }
        ];

        let currentDept = 'ทั้งหมด';
        let currentTypeFilter = 'ทั้งหมด';
        let viewMode = 'table';

        const depts = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ฝขว.', 'ฝยก.', 'หน่วย 250', 'ปจว.', 'ฝปส.', 'ฝยส.', 'ศสน.'];
        const types = ['ทั้งหมด', 'Server', 'PC', 'Notebook', 'Fax', 'Printer', 'Mobile', 'iPad', 'Router', 'Switch'];

        // --- 2. การจัดการสีและไอคอน ---
        function getDeviceTypeClass(type) {
            switch(type) {
                case 'Server': return 'device-server';
                case 'PC': return 'device-pc';
                case 'Notebook': return 'device-notebook';
                case 'Fax': return 'device-fax';
                default: return 'device-default';
            }
        }

        function getBadgeClass(type) {
            switch(type) {
                case 'Server': return 'badge-server';
                case 'PC': return 'badge-pc';
                case 'Notebook': return 'badge-notebook';
                case 'Fax': return 'badge-fax';
                default: return 'badge-gray';
            }
        }

        function getDeviceIcon(type) {
            const icons = {
                'PC': 'fa-desktop', 'Notebook': 'fa-laptop', 'Printer': 'fa-print',
                'Mobile': 'fa-mobile-screen', 'iPad': 'fa-tablet-screen-button',
                'Server': 'fa-server', 'Router': 'fa-wifi', 'Switch': 'fa-network-wired',
                'Fax': 'fa-fax'
            };
            return icons[type] || 'fa-microchip';
        }

        // --- 3. การเรนเดอร์ UI ---
        function renderFilters() {
            const deptContainer = document.getElementById('deptMenu');
            deptContainer.innerHTML = depts.map(d => `
                <button onclick="setFilter('dept', '${d}')" class="flex justify-between items-center px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${currentDept === d ? 'bg-slate-700 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-200'}">
                    <span>${d}</span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded-full ${currentDept === d ? 'bg-white/20' : 'bg-slate-200'}">
                        ${d === 'ทั้งหมด' ? devices.length : devices.filter(x => x.dept === d).length}
                    </span>
                </button>
            `).join('');

            const typeContainer = document.getElementById('typeMenu');
            typeContainer.innerHTML = types.map(t => `
                <button onclick="setFilter('type', '${t}')" class="flex justify-between items-center px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${currentTypeFilter === t ? 'bg-slate-700 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-200'}">
                    <span>${t}</span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded-full ${currentTypeFilter === t ? 'bg-white/20' : 'bg-slate-200'}">
                        ${t === 'ทั้งหมด' ? devices.length : devices.filter(x => x.type === t).length}
                    </span>
                </button>
            `).join('');
        }

        function renderTable(data = devices) {
            const tbody = document.getElementById('deviceTableBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-400 font-medium italic">ไม่พบข้อมูลในหมวดหมู่นี้</td></tr>`;
                updateStats(); return;
            }

            tbody.innerHTML = data.map(d => `
                <tr class="hover:bg-slate-50 transition-colors ${getDeviceTypeClass(d.type)}">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-500">
                                <i class="fa-solid ${getDeviceIcon(d.type)}"></i>
                            </div>
                            <span class="font-bold text-slate-700">${d.name}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase border ${getBadgeClass(d.type)}">
                            ${d.type}
                        </span>
                    </td>
                    <td class="px-6 py-4 mono font-bold text-slate-500 text-sm">${d.ip || '-'}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-xl text-xs font-bold bg-slate-100 text-slate-600 border border-slate-200">
                            ${d.dept}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editDevice(${d.id})" class="w-9 h-9 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-pencil text-xs"></i></button>
                            <button onclick="deleteDevice(${d.id})" class="w-9 h-9 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all shadow-sm flex items-center justify-center"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateStats();
        }

        function renderIpMap() {
            const container = document.getElementById('ipGridContainer');
            let html = '';
            let used = 0;
            
            for(let i = 1; i <= 255; i++) {
                const ipStr = `192.168.10.${i}`;
                const device = devices.find(d => d.ip === ipStr);
                
                if(device) {
                    used++;
                    html += `
                        <div onclick="editDevice(${device.id})" class="p-2.5 rounded-xl border border-slate-200 ${getBadgeClass(device.type)} cursor-pointer text-center shadow-sm hover:scale-105 transition-all">
                            <div class="text-[9px] font-black opacity-50 mb-1">.${i}</div>
                            <i class="fa-solid ${getDeviceIcon(device.type)} text-xs"></i>
                            <div class="text-[8px] font-black truncate mt-1">${device.name}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div onclick="addWithIp('${ipStr}')" class="p-2.5 rounded-xl bg-slate-50 border border-dashed border-slate-300 text-slate-300 hover:border-slate-400 hover:text-slate-500 cursor-pointer text-center group transition-all">
                            <div class="text-[9px] font-black opacity-40 mb-1">.${i}</div>
                            <i class="fa-solid fa-plus opacity-0 group-hover:opacity-100 text-xs"></i>
                            <div class="text-[8px] font-bold mt-1 uppercase tracking-tighter">ว่าง</div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            updateStats(used);
        }

        // --- 4. ฟังก์ชันจัดการตรรกะระบบ ---
        function setFilter(type, value) {
            if(type === 'dept') currentDept = value;
            else currentTypeFilter = value;
            
            viewMode = 'table';
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('ipMapView').classList.add('hidden');
            renderFilters();
            filterDevices();
        }

        function toggleIpView() {
            viewMode = 'ipmap';
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('ipMapView').classList.remove('hidden');
            renderIpMap();
        }

        function filterDevices() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = devices.filter(d => {
                const matchDept = (currentDept === 'ทั้งหมด' || d.dept === currentDept);
                const matchType = (currentTypeFilter === 'ทั้งหมด' || d.type === currentTypeFilter);
                const matchQuery = (d.name.toLowerCase().includes(q) || (d.ip && d.ip.toLowerCase().includes(q)));
                return matchDept && matchType && matchQuery;
            });
            renderTable(filtered);
        }

        function updateStats(usedCount = null) {
            const used = usedCount !== null ? usedCount : devices.filter(d => d.ip && d.ip.startsWith('192.168.10.')).length;
            document.getElementById('usedCount').innerText = used;
            document.getElementById('unusedCount').innerText = 255 - used;
        }

        function openModal(id = null) {
            const m = document.getElementById('deviceModal');
            document.getElementById('deviceForm').reset();
            document.getElementById('deviceId').value = '';
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนอุปกรณ์ใหม่';
            
            if(id) {
                const d = devices.find(x => x.id === id);
                document.getElementById('deviceId').value = d.id;
                document.getElementById('deviceName').value = d.name;
                document.getElementById('deviceType').value = d.type;
                document.getElementById('deviceIp').value = d.ip || '';
                document.getElementById('deviceDept').value = d.dept;
                document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลอุปกรณ์';
            }
            m.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() { document.getElementById('deviceModal').classList.add('hidden'); document.body.classList.remove('modal-active'); }

        function handleSave(event) {
            event.preventDefault();
            const id = document.getElementById('deviceId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('deviceName').value,
                type: document.getElementById('deviceType').value,
                ip: document.getElementById('deviceIp').value,
                dept: document.getElementById('deviceDept').value
            };
            if(id) { const idx = devices.findIndex(x => x.id === parseInt(id)); devices[idx] = data; }
            else { devices.push(data); }
            closeModal();
            renderFilters();
            if(viewMode === 'ipmap') renderIpMap(); else filterDevices();
        }

        function addWithIp(ip) { openModal(); document.getElementById('deviceIp').value = ip; }
        function editDevice(id) { openModal(id); }
        function deleteDevice(id) { if(confirm('ยืนยันการลบข้อมูลอุปกรณ์?')) { devices = devices.filter(x => x.id !== id); renderFilters(); if(viewMode === 'ipmap') renderIpMap(); else filterDevices(); } }

        window.onload = () => { renderFilters(); renderTable(); };
    </script>
</body>
</html>
