<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Udon Checkpoint - v20 HD Clear</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a73e8; --red: #d93025; --dark: #111; --accent: #fbbc04; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 10; background: #000; }
        
        /* Compact Header */
        .header { position: fixed; top: 12px; left: 12px; z-index: 1000; background: white; padding: 6px 14px; border-radius: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.25); display: flex; align-items: center; gap: 6px; border: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 13px; color: #333; font-weight: 600; white-space: nowrap; }
        .header img { width: 16px; height: 16px; }

        #adminBtn { position: fixed; top: 12px; right: 12px; z-index: 1000; background: white; border: none; padding: 8px; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; }

        /* Presence & Chat */
        #onlineList { background: #fff; border-bottom: 1px solid #eee; padding: 8px 12px; font-size: 10px; display: flex; gap: 6px; overflow-x: auto; white-space: nowrap; align-items: center; }
        .online-tag { background: #f1f3f4; color: #5f6368; padding: 3px 10px; border-radius: 12px; font-weight: 600; border: 1px solid #ddd; }
        .online-tag.me { background: #e8f0fe; color: #1a73e8; border-color: #1a73e8; }

        #chatDrawer { position: fixed; bottom: -65vh; left: 0; width: 100%; height: 60vh; background: white; z-index: 2000; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); transition: 0.4s; display: flex; flex-direction: column; }
        #chatDrawer.active { bottom: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 8px; }

        /* Marker Styles - Optimized for HD */
        .marker-wrapper { display: flex; align-items: center; white-space: nowrap; pointer-events: none; }
        .straight-pin { background: white; border-radius: 50%; width: 38px !important; height: 38px !important; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,0.4); border: 2px solid white; position: relative; pointer-events: auto; transform: translateZ(0); }
        .straight-pin::after { content: ''; position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 13px solid white; }
        .pin-label { background: rgba(255, 255, 255, 0.95); padding: 4px 10px; border-radius: 18px; margin-left: 10px; border: 1px solid #ddd; color: #111; font-weight: 800; font-size: 11px; pointer-events: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #selector { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 20px 55px; background: white; border-radius: 30px 30px 0 0; z-index: 6000; display: none; box-shadow: 0 -10px 40px rgba(0,0,0,0.4); text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .choice-btn { padding: 20px; border: none; border-radius: 20px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Kanit'; }

        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; width: 92%; max-width: 450px; transition: 0.3s; }
        .bottom-nav.hide { transform: translate(-50%, 150%); }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 16px; font-weight: 800; font-size: 15px; background: white; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Kanit'; }
        
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5000; pointer-events: none; display: none; width: 34px; height: 34px; }
        #crosshair::before { content:''; position:absolute; top:16px; left:0; width:100%; height:2px; background:red; }
        #crosshair::after { content:''; position:absolute; left:16px; top:0; width:2px; height:100%; background:red; }
        #toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 8px 16px; border-radius: 8px; z-index: 8000; display: none; font-size: 13px; text-align: center; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="toast"></div>

    <div id="nickOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; display:none; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:24px; text-align:center; width:260px">
            <h3 style="margin:0 0 10px; font-size:18px">ตั้งชื่อเล่น</h3>
            <p id="nickError" style="color:red; font-size:11px; display:none; margin-bottom:10px">ชื่อนี้มีคนใช้แล้ว</p>
            <input type="text" id="nickInput" placeholder="กาย อุดร" style="width:100%; padding:14px; margin-bottom:15px; border:1px solid #ddd; border-radius:12px; font-family:'Kanit'; font-size:16px">
            <button onclick="saveNick()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px">ตกลง</button>
        </div>
    </div>

    <div id="selector">
        <h3 style="margin:0; font-size:18px">📌 เลือกประเภทด่าน</h3>
        <div class="btn-grid">
            <button class="choice-btn" style="background:#1a73e8" onclick="onFinalSubmit('👮 จราจร')">👮 จราจร</button>
            <button class="choice-btn" style="background:#d93025" onclick="onFinalSubmit('🚨 ด่านเป่า')">🚨 ด่านเป่า</button>
        </div>
        <button onclick="cancelAndHide()" style="margin-top:25px; border:none; background:none; color:#bbb; font-family:'Kanit'; font-size:14px">กลับไปเลื่อนตำแหน่ง</button>
    </div>

    <button id="adminBtn" onclick="toggleAdmin()">
        <i data-lucide="shield-check" id="adminIcon" style="color:var(--primary); display:none"></i>
        <i data-lucide="user" id="userIcon" style="width:18px"></i>
    </button>

    <div class="header">
        <img src="https://www.gstatic.com/images/branding/product/1x/maps_64dp.png">
        <h1>Udon Checkpoint (v20 HD)</h1>
    </div>

    <div id="map"></div>

    <div id="chatDrawer">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center" onclick="toggleChat()">
            <strong id="chatHeadline" style="font-size:14px">💬 แชทสด (Online 0)</strong>
            <i data-lucide="chevron-down" style="width:18px"></i>
        </div>
        <div id="onlineList">
            <span>Online: </span>
            <div id="presenceTags" style="display:flex; gap:5px; align-items:center"></div>
        </div>
        <div class="chat-messages" id="chatList"></div>
        <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px; margin-bottom:20px">
            <input type="text" id="msgInput" style="flex:1; padding:12px 18px; border:1px solid #ddd; border-radius:30px; outline:none; font-family:'Kanit'; font-size:14px" placeholder="คุยกันที่นี่..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center"><i data-lucide="send" style="width:18px"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn" style="background:#333; color:white" onclick="toggleChat()"><i data-lucide="message-square" style="width:18px"></i> แชท</button>
        <button class="btn" id="startBtn" style="background:var(--primary); color:white" onclick="startSelection()">📌 แจ้งด่าน</button>
        <button class="btn" id="confirmPosBtn" style="background:var(--accent); color:black; display:none" onclick="confirmPosition()">📍 ยืนยันพิกัด</button>
        <button class="btn" onclick="location.reload()" style="flex:0.4"><i data-lucide="rotate-cw" style="width:18px"></i></button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD98OmwUysgQdUmFe0V8EavoO4fCVlzUQs",
            authDomain: "udcp-dade8.firebaseapp.com",
            projectId: "udcp-dade8",
            databaseURL: "https://udcp-dade8-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "udcp-dade8.firebasestorage.app",
            messagingSenderId: "736886466307",
            appId: "1:736886466307:web:2ffd5a44d5f0b88ec76b36",
            measurementId: "G-P6SYB59ZGP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const P_REF = db.ref('points');
        const C_REF = db.ref('chat');
        const PRES_REF = db.ref('presence');

        let map, markerGroup, isAdmin = sessionStorage.getItem('asAdmin') === 'true';
        let nick = localStorage.getItem('chat_nick');
        let myPresenceRef = null, onlineNames = [], tempMarker = null;

        window.onload = () => {
            // --- HD Map Setup ---
            map = L.map('map', { 
                zoomControl:false, 
                attributionControl:false,
                fadeAnimation: true,
                zoomAnimation: true
            }).setView([17.4138, 102.7872], 14);

            // ใช้ detectRetina เพื่อให้ชัดบนมือถือ
            L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&scale=2', { 
                maxZoom: 20,
                detectRetina: true,
                subdomains: ['mt0','mt1','mt2','mt3']
            }).addTo(map);

            markerGroup = L.layerGroup().addTo(map);
            listenPoints(); listenChat(); listenPresence();
            if(!nick) document.getElementById('nickOverlay').style.display='flex'; else setupPresence();
            lucide.createIcons();
        };

        function startSelection() { document.getElementById('crosshair').style.display='block'; document.getElementById('startBtn').style.display='none'; document.getElementById('confirmPosBtn').style.display='flex'; showToast("📍 เล็งจุดแจ้งด่านให้ตรงเป้า"); }
        function confirmPosition() { const c = map.getCenter(); window.activeLL = c; if(tempMarker) map.removeLayer(tempMarker); tempMarker = L.marker(c).addTo(map); document.getElementById('confirmPosBtn').style.display='none'; document.getElementById('selector').style.display='block'; }
        function cancelAndHide() { if(tempMarker) map.removeLayer(tempMarker); document.getElementById('crosshair').style.display='block'; document.getElementById('confirmPosBtn').style.display='flex'; document.getElementById('selector').style.display='none'; }
        function cancelAll() { if(tempMarker) map.removeLayer(tempMarker); document.getElementById('crosshair').style.display='none'; document.getElementById('startBtn').style.display='flex'; document.getElementById('confirmPosBtn').style.display='none'; document.getElementById('selector').style.display='none'; }
        function onFinalSubmit(type) { P_REF.push({ lat: window.activeLL.lat, lng: window.activeLL.lng, type, createdAt: firebase.database.ServerValue.TIMESTAMP, votes: 0, reporter: nick }); C_REF.push({ n: '📢 ระบบ', t: `แจ้งพบ ${type} (โดย ${nick})`, ts: firebase.database.ServerValue.TIMESTAMP }); cancelAll(); showToast("✨ ขอบคุณที่แบ่งปันข้อมูล!"); }

        function listenPoints() {
            P_REF.on('value', snap => {
                markerGroup.clearLayers();
                snap.forEach(c => {
                    const p = c.val(); if(Date.now() - p.createdAt > (3*60*60*1000)) { P_REF.child(c.key).remove(); return; }
                    const d = new Date(p.createdAt); const time = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
                    const html = `<div class="marker-wrapper"><div class="straight-pin"><span class="pin-emoji">${p.type.includes('จราจร')?'👮':'🚨'}</span></div><div class="pin-label">${p.type}<br><small>${p.reporter} · ${time}</small></div></div>`;
                    const m = L.marker([p.lat, p.lng], { icon: L.divIcon({ className:'dm', html, iconSize:[0,0], iconAnchor:[19,49] }) }).addTo(markerGroup);
                    m.bindPopup(`<div style="text-align:center"><b>${p.type}</b><br><small>เวลาข่าว: ${time}</small><hr><button onclick="voteDown('${c.key}')" style="width:100%; padding:8px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer">${isAdmin ? '❌ ลบทันที' : `❌ ไม่อยู่แล้ว (${p.votes||0}/3)`}</button></div>`);
                });
            });
        }
        function voteDown(k) { if(isAdmin) { P_REF.child(k).remove(); return; } P_REF.child(k).transaction(c => { if(c) { c.votes = (c.votes||0)+1; if(c.votes>=3) return null; } return c; }); }
        function setupPresence() { myPresenceRef = PRES_REF.push(); db.ref(".info/connected").on("value", s => { if(s.val()) { myPresenceRef.onDisconnect().remove(); myPresenceRef.set({ name: nick }); } }); }
        function listenPresence() {
            PRES_REF.on('value', snap => {
                const list = document.getElementById('presenceTags'); let count = 0; list.innerHTML = ""; onlineNames = [];
                snap.forEach(c => { count++; onlineNames.push(c.val().name); const tag = document.createElement('div'); tag.className = 'online-tag' + (c.val().name===nick?' me':''); tag.innerText = c.val().name; list.appendChild(tag); });
                document.getElementById('chatHeadline').innerText = `💬 แชทสด (Online ${count})`;
            });
        }
        function saveNick() { const v = document.getElementById('nickInput').value.trim(); if(v && !onlineNames.includes(v)) { nick = v; localStorage.setItem('chat_nick', v); document.getElementById('nickOverlay').style.display='none'; setupPresence(); } else if(onlineNames.includes(v)) document.getElementById('nickError').style.display='block'; }
        function toggleChat() { document.getElementById('chatDrawer').classList.toggle('active'); document.querySelector('.bottom-nav').classList.toggle('hide'); }
        function sendMsg() { const t = document.getElementById('msgInput').value.trim(); if(t && nick) { C_REF.push({ n: nick, t: t, ts: firebase.database.ServerValue.TIMESTAMP }); document.getElementById('msgInput').value=""; } }
        function listenChat() { C_REF.limitToLast(50).on('value', snap => { const l = document.getElementById('chatList'); l.innerHTML = ""; snap.forEach(c => { const m = c.val(); const isMe = m.n === nick; const d = new Date(m.ts); const div = document.createElement('div'); div.className = `msg ${isMe?'msg-me':'msg-other'}`; div.innerHTML = `<small style="display:block; font-weight:bold; opacity:0.7">${m.n} · ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}</small>${m.t}`; l.appendChild(div); }); l.scrollTop = l.scrollHeight; }); }
        function toggleAdmin() { document.getElementById('loginOverlay').style.display='flex'; }
        function doLogin() { if(document.getElementById('u').value==='admin' && document.getElementById('p').value==='admin22') { isAdmin=true; sessionStorage.setItem('asAdmin', 'true'); document.getElementById('loginOverlay').style.display='none'; } }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 4000); }
    </script>
</body>
</html>
