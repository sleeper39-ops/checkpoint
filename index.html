<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Udon Checkpoint Report - ระบบแจ้งด่านอุดร</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --info: #1e90ff;
            --dark: #1e272e;
            --glass: rgba(0, 0, 0, 0.82);
        }

        body {
            margin: 0; padding: 0; font-family: 'Kanit', sans-serif;
            background-color: #000; overflow: hidden;
        }

        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Icon Animation */
        .emoji-icon {
            font-size: 34px; display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        /* Header UI */
        .header {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--glass); backdrop-filter: blur(10px);
            padding: 8px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; gap: 8px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .header h1 { margin: 0; font-size: 14px; white-space: nowrap; }

        /* Selection Modal */
        #selectionModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            flex-direction: column; opacity: 0; transition: opacity 0.3s;
        }

        .modal-content {
            background: #222; padding: 25px; border-radius: 30px;
            width: 85%; max-width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-content h2 { color: white; text-align: center; margin: 0 0 10px 0; font-size: 18px; }

        .choice-btn {
            padding: 20px; border: none; border-radius: 20px; cursor: pointer;
            font-family: 'Kanit', sans-serif; font-size: 20px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            color: white; transition: transform 0.2s;
        }
        .choice-btn:active { transform: scale(0.95); }
        .btn-traffic { background: linear-gradient(135deg, #1e90ff, #00d2ff); }
        .btn-checkpoint { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-cancel { background: transparent; color: #aaa; font-size: 14px; padding: 10px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 12px; width: 90%; max-width: 400px;
        }

        .btn {
            flex: 1; padding: 16px; border: none; border-radius: 22px;
            font-weight: 600; font-size: 17px; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: 'Kanit', sans-serif;
        }
        .btn-report { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        .btn-report.selecting { background: var(--warning); animation: pulse 1s infinite; }
        .btn-refresh { background: #333; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Popup */
        .leaflet-popup-content-wrapper { border-radius: 20px; background: rgba(255, 255, 255, 0.95); }
        .popup-container { text-align: center; min-width: 180px; padding: 5px; }
        .popup-title { font-weight: 600; font-size: 20px; color: var(--dark); display: block; }
        .popup-time { font-size: 12px; color: #666; display: block; margin-bottom: 12px; }
        .v-stats { display: flex; justify-content: space-around; font-size: 14px; font-weight: bold; margin-bottom: 15px; }
        .v-row { display: flex; gap: 8px; }
        .v-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; color: white; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: bold; font-size: 14px; }
        .vb-up { background: var(--success); }
        .vb-down { background: var(--warning); }

        /* Toast & Loader */
        #toast { position: fixed; top: 65px; left: 50%; transform: translateX(-50%); background: var(--warning); color: white; padding: 8px 20px; border-radius: 50px; z-index: 2000; display: none; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px;">กำลังเตรียมแผนที่ดาวเทียม...</p>
    </div>

    <div id="selectionModal">
        <div class="modal-content">
            <h2>🚨 เลือกประเภทด่าน</h2>
            <button class="choice-btn btn-traffic" onclick="confirmReport('👮 ด่านจราจร')">👮 ด่านจราจร</button>
            <button class="choice-btn btn-checkpoint" onclick="confirmReport('🚨 ด่านเป่า')">🚨 ด่านเป่า</button>
            <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
        </div>
    </div>

    <div id="toast">👆 แตะเลือกจุดที่พบด่านบนแผนที่</div>

    <div class="header">
        <span>🛰️</span>
        <h1>รายงานด่านอุดร (3 ชม.)</h1>
    </div>

    <div id="map"></div>

    <div class="bottom-nav">
        <button class="btn btn-refresh" onclick="location.reload()">
            <i data-lucide="rotate-cw"></i> อัปเดต
        </button>
        <button class="btn btn-report" id="reportBtn" onclick="toggleSelectionMode()">
             📌 แจ้งพบด่าน
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const STORAGE_KEY = 'udon_checkpoints_v4';
        const EXPIRE_TIME = 3 * 60 * 60 * 1000;
        const DELETE_VOTES = 5;
        let isSelectingLocation = false;
        let selectedLatLng = null;

        // --- Data ---
        function getCheckpoints() {
            let data = localStorage.getItem(STORAGE_KEY);
            let list = data ? JSON.parse(data) : [];
            const now = Date.now();
            const filtered = list.filter(cp => (now - cp.id) < EXPIRE_TIME);
            if (filtered.length !== list.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
            return filtered;
        }

        function saveCheckpoint(lat, lng, type) {
            const list = getCheckpoints();
            list.push({ id: Date.now(), lat, lng, type, up: 0, down: 0 });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            location.reload();
        }

        function handleVote(id, voteType) {
            let list = getCheckpoints();
            const idx = list.findIndex(cp => cp.id === id);
            if (idx !== -1) {
                if (voteType === 'up') list[idx].up += 1;
                else {
                    list[idx].down += 1;
                    if (list[idx].down >= DELETE_VOTES) {
                        list.splice(idx, 1);
                        alert("ด่านถูกลบแล้วเนื่องจากไม่มีอยู่จริงครบ 5 คน");
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                        location.reload(); return;
                    }
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                location.reload();
            }
        }

        // --- Map ---
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([17.4138, 102.7872], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { pane: 'shadowPane' }).addTo(map);

        function renderMarkers() {
            getCheckpoints().forEach(cp => {
                const icon = L.divIcon({
                    className: 'emoji-icon',
                    html: cp.type.includes('จราจร') ? '👮' : '🚨',
                    iconSize: [40, 40], iconAnchor: [20, 20]
                });
                const marker = L.marker([cp.lat, cp.lng], { icon }).addTo(map);
                const timeAgo = Math.floor((Date.now() - cp.id) / 60000);
                
                marker.bindPopup(`
                    <div class="popup-container">
                        <span class="popup-title">${cp.type}</span>
                        <span class="popup-time">เมื่อ ${timeAgo} นาทีที่แล้ว</span>
                        <div class="v-stats">
                            <span style="color:var(--success)">✅ ยังอยู่: ${cp.up}</span>
                            <span style="color:var(--primary)">❌ ไม่อยู่: ${cp.down}/${DELETE_VOTES}</span>
                        </div>
                        <div class="v-row">
                            <button class="v-btn vb-up" onclick="handleVote(${cp.id}, 'up')">ยังอยู่</button>
                            <button class="v-btn vb-down" onclick="handleVote(${cp.id}, 'down')">ไม่อยู่แล้ว</button>
                        </div>
                    </div>
                `);
            });
        }

        // --- Interaction ---
        function toggleSelectionMode() {
            isSelectingLocation = !isSelectingLocation;
            const btn = document.getElementById('reportBtn');
            const toast = document.getElementById('toast');
            if (isSelectingLocation) {
                btn.innerHTML = '🎯 จิ้มจุดบนแผนภาพ';
                btn.classList.add('selecting');
                toast.style.display = 'block';
            } else {
                btn.innerHTML = '📌 แจ้งพบด่าน';
                btn.classList.remove('selecting');
                toast.style.display = 'none';
            }
        }

        map.on('click', function (e) {
            if (isSelectingLocation) {
                selectedLatLng = e.latlng;
                const modal = document.getElementById('selectionModal');
                modal.style.display = 'flex';
                setTimeout(() => modal.style.opacity = '1', 10);
            }
        });

        function confirmReport(type) {
            if (selectedLatLng) {
                saveCheckpoint(selectedLatLng.lat, selectedLatLng.lng, type);
                closeModal();
            }
        }

        function closeModal() {
            const modal = document.getElementById('selectionModal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                toggleSelectionMode();
            }, 300);
        }

        // --- Start ---
        window.onload = () => {
            renderMarkers();
            lucide.createIcons();
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 800);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    L.circleMarker([pos.coords.latitude, pos.coords.longitude], { radius: 8, fillColor: "#3498db", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
                    map.panTo([pos.coords.latitude, pos.coords.longitude]);
                }, null, { enableHighAccuracy: true });
            }
        };
    </script>
</body>

</html>
