name: Remote File Mover (Tailscale)
on:
  workflow_dispatch: # ทำให้คุณกดปุ่ม "Run" จากหน้าเว็บ GitHub ในมือถือได้ทันที
    inputs:
      source_path:
        description: 'Path ต้นทาง (เครื่อง 1)'
        required: true
        default: 'C:\Source'
      target_ip:
        description: 'IP Tailscale (เครื่อง 2)'
        required: true
      target_folder:
        description: 'Shared Folder (เครื่อง 2)'
        required: true

jobs:
  move-files:
    runs-on: windows-latest # ใช้ Windows บน Cloud ของ GitHub รันแทนคอมคุณ
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Execute Move via PowerShell
        run: |
          $src = "${{ github.event.inputs.source_path }}"
          $dest = "\\${{ github.event.inputs.target_ip }}\${{ github.event.inputs.target_folder }}"
          
          # เชื่อมต่อ Network Drive ข้ามเครื่องผ่าน Tailscale VPN
          net use \\${{ github.event.inputs.target_ip }} /y
          
          if (Test-Path $src) {
            Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
            echo "✅ ย้ายไฟล์สำเร็จ!"
          } else {
            echo "❌ ไม่พบ Path ต้นทาง"
            exit 1
          }
